<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Torneos Recreos 2026</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
background:#1f2937;
color:white;
padding:20px;
}

section{
background:#2b3648;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
font-size:18px;
border:none;
border-radius:8px;
}

button{
background:#16a34a;
color:white;
font-weight:bold;
}

h1,h2{
text-align:center;
}

</style>

</head>

<body>

<section>

<h1>🏆 Torneos Recreos 2026</h1>

<button onclick="login()">
🔒 Entrar como administrador
</button>

</section>

<section id="admin" style="display:none;">

<h2>Cargar Resultado</h2>

<label>Equipo Local</label>

<select id="local">
<option>Bluleavens</option>
<option>6B</option>
</select>

<label>Goles Local</label>

<input type="number" id="gLocal" value="0">

<label>Equipo Visitante</label>

<select id="visitante">
<option>6B</option>
<option>Bluleavens</option>
</select>

<label>Goles Visitante</label>

<input type="number" id="gVisitante" value="0">

<button onclick="guardarResultado()">
Guardar Resultado
</button>

<button onclick="borrarResultado()">
🗑️ Borrar Resultado
</button>

</section>

<section>

<h2>Último Resultado</h2>

<h1 id="resultado">
Cargando...
</h1>

    </section>
<script>

const supabase = window.supabase.createClient(
  "https://wboaghrdzbyqlbhcmqqr.supabase.sb_publishable_x3jdL4rswZOSdn6qYkEF5w_wCXcq9a3"
);

function login(){

  const pass = prompt("Contraseña");

  if(pass==="Gimnasia1"){
    document.getElementById("admin").style.display="block";
  }else{
    alert("Contraseña incorrecta");
  }

}

async function guardarResultado(){

  const local = document.getElementById("local").value;
  const visitante = document.getElementById("visitante").value;
  const goles_local = Number(document.getElementById("gLocal").value);
  const goles_visitante = Number(document.getElementById("gVisitante").value);

  const { error } = await supabase
    .from("resultados")
    .insert([{
      local,
      goles_local,
      visitante,
      goles_visitante
    }]);

  if(error){
    alert("Error: " + error.message);
    return;
  }

  alert("Resultado guardado");

  cargarResultado();

}

async function cargarResultado(){

  const { data, error } = await supabase
    .from("resultados")
    .select("*")
    .order("id",{ascending:false})
    .limit(1);

  if(error || !data.length){
    document.getElementById("resultado").innerHTML="Todavía no hay resultados.";
    return;
  }

  const r = data[0];

  document.getElementById("resultado").innerHTML =
    `${r.local} ${r.goles_local} - ${r.goles_visitante} ${r.visitante}`;

}

async function borrarResultado(){

  const { data } = await supabase
    .from("resultados")
    .select("id")
    .order("id",{ascending:false})
    .limit(1);

  if(!data.length) return;

  await supabase
    .from("resultados")
    .delete()
    .eq("id",data[0].id);

  cargarResultado();

}

cargarResultado();

</script>

</body>
</html>
