<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneos Recreos 2026</title>

<style>
body{
margin:0;
background:#0f172a;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

header{
background:#15803d;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

nav{
background:#1e293b;
padding:15px;
text-align:center;
}

nav button{
background:#22c55e;
color:white;
border:none;
padding:10px 18px;
margin:5px;
border-radius:10px;
font-size:16px;
}

section{
background:#1e293b;
margin:15px;
padding:20px;
border-radius:15px;
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button.guardar{
background:#16a34a;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-size:18px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #555;
padding:10px;
text-align:center;
}

th{
background:#16a34a;
}

.oculto{
display:none;
}
</style>

</head>

<body>

<header>
🏆 Torneos Recreos 2026
</header>

<section>

<h2>🔒 Administrador</h2>

<input type="password" id="pass" placeholder="Contraseña">

<button class="guardar" onclick="login()">
Entrar
</button>

<p id="estado"></p>

</section>

<section id="admin" class="oculto">

<h2>⚽ Cargar Resultado</h2>

<label>Equipo Local</label>

<select id="local">
<option>Bluleavens</option>
<option>6B</option>
</select>

<label>Goles</label>

<input type="number" id="gLocal" value="0">

<label>Equipo Visitante</label>

<select id="visitante">
<option>6B</option>
<option>Bluleavens</option>
</select>

<label>Goles</label>

<input type="number" id="gVisitante" value="0">

<button class="guardar" onclick="guardarResultado()">
Guardar Resultado
</button>

</section>

<section>

<h2>📋 Último Resultado</h2>

<h3 id="resultado">
Todavía no hay resultados.
</h3>

</section>

<section>

<h2>🥅 Goles por jugador</h2>
