<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Torneos Recreos 2026</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial,sans-serif;
background:#1f2937;
color:white;
margin:0;
padding:20px;
}

section{
background:#2b3648;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

h1,h2{
text-align:center;
}

input,select,button{
width:100%;
padding:12px;
margin:8px 0;
font-size:18px;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#15803d;
}

#resultado{
font-size:35px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<section>

<h1>🏆 Torneos Recreos 2026</h1>

<button onclick="login()">
🔒 Entrar como administrador
</button>

</section>

<section id="admin" style="display:none;">

<h2>Cargar Resultado</h2>

<label>Equipo Local</label>

<select id="local">
<option>Blueleavens</option>
<option>6B</option>
</select>

<label>Goles Local</label>

<input type="number" id="gLocal" value="0">

<label>Equipo Visitante</label>

<select id="visitante">
<option>6B</option>
<option>Blueleavens</option>
</select>

<label>Goles Visitante</label>

<input type="number" id="gVisitante" value="0">

<button onclick="guardarResultado()">
💾 Guardar Resultado
</button>

<button onclick="borrarResultado()">
🗑️ Borrar Resultado
</button>

</section>

<section>

<h2>Último Resultado</h2>

<h1 id="resultado">
Cargando...
</h1>

</section>

<script>
const supabase = window.supabase.createClient(
  const supabase = window.supabase.createClient(
  "https://wboaghrdzbyqlbhcmqqr.supabase.co",
  "sb_publishable_x3jdL4rswZOSdn6qYkEF5w_wCXcq9a3"
);

function login(){

  const pass = prompt("Contraseña");

  if(pass==="Gimnasia1"){
    document.getElementById("admin").style.display="block";
  }else{
    alert("Contraseña incorrecta");
  }

}

async function guardarResultado(){

  const local = document.getElementById("local").value;
  const visitante = document.getElementById("visitante").value;
  const goles_local = parseInt(document.getElementById("gLocal").value);
  const goles_visitante = parseInt(document.getElementById("gVisitante").value);

  const { error } = await supabase
    .from("resultados")
    .insert([{
      local: local,
      goles_local: goles_local,
      visitante: visitante,
      goles_visitante: goles_visitante
    }]);

  if(error){
    alert("Error: " + error.message);
    return;
  }

  alert("Resultado guardado");
  cargarResultado();

}

async function cargarResultado(){

  const { data, error } = await supabase
    .from("resultados")
    .select("*")
    .order("id",{ascending:false})
    .limit(1);

  if(error){
    document.getElementById("resultado").innerHTML="Error al conectar";
    return;
  }

  if(data.length===0){
    document.getElementById("resultado").innerHTML="Todavía no hay resultados";
    return;
  }

  const r=data[0];

  document.getElementById("resultado").innerHTML=
  r.local+" "+r.goles_local+" - "+r.goles_visitante+" "+r.visitante;

}
async function borrarResultado(){

  const { data, error } = await supabase
    .from("resultados")
    .select("id")
    .order("id",{ascending:false})
    .limit(1);

  if(error){
    alert("Error: " + error.message);
    return;
  }

  if(data.length===0){
    alert("No hay resultados para borrar");
    return;
  }

  const { error: borrarError } = await supabase
    .from("resultados")
    .delete()
    .eq("id", data[0].id);

  if(borrarError){
    alert("Error: " + borrarError.message);
    return;
  }

  alert("Resultado borrado");
  cargarResultado();

}

window.onload=function(){

  cargarResultado();

}

</script>

</body>
</html>
