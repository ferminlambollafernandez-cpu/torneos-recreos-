<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Torneos Recreos 2026</title>

<style>

body{
background:#1f2937;
color:white;
font-family:Arial;
margin:20px;
}

section{
background:#263246;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border-radius:8px;
border:none;
font-size:18px;
}

button{
background:#16a34a;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#15803d;
}

</style>
</head>

<body>

<section>

<h1>🏆 Torneos Recreos 2026</h1>

<button onclick="admin()">🔒 Admin</button>

</section>

<section id="panel" style="display:none;">

<h2>⚽ Cargar Resultado</h2>

<label>Local</label>

<select id="local">
<option>Bluleavens</option>
<option>6B</option>
</select>

<label>Goles</label>

<input type="number" id="gLocal" value="0">

<label>Visitante</label>

<select id="visitante">
<option>6B</option>
<option>Bluleavens</option>
</select>

<label>Goles</label>

<input type="number" id="gVisitante" value="0">

<button onclick="guardarResultado()">
Guardar Resultado
</button>

<button onclick="borrarResultado()">
🗑️ Borrar Resultado
</button>

</section>

<section>

<h2>📋 Último Resultado</h2>

<h3 id="resultado">
Todavía no hay resultados.
</h3>

</section>

<script>

function admin(){

let pass=prompt("Contraseña");

if(pass=="Gimnasia1"){
document.getElementById("panel").style.display="block";
}else{
alert("Contraseña incorrecta");
}

}

function guardarResultado(){

let local=document.getElementById("local").value;
let visitante=document.getElementById("visitante").value;

let gl=document.getElementById("gLocal").value;
let gv=document.getElementById("gVisitante").value;

let resultado=local+" "+gl+" - "+gv+" "+visitante;

document.getElementById("resultado").innerHTML=resultado;

localStorage.setItem("resultado",resultado);

alert("Resultado guardado");

}

function borrarResultado(){

localStorage.removeItem("resultado");

document.getElementById("resultado").innerHTML="Todavía no hay resultados.";

alert("Resultado borrado");

}

window.onload=function(){

let r=localStorage.getItem("resultado");

if(r){
document.getElementById("resultado").innerHTML=r;
}

}

</script>

</body>
</html>#
